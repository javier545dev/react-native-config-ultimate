name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version being published (for reference only)"
        required: false
        default: "latest"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Copy LICENSE and README to package
        run: cp LICENSE README.md packages/react-native-config-ultimate/

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: packages/react-native-config-ultimate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
