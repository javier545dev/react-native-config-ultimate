name: publish on tag

on:
  push:
    tags:
      - v*

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: packages/react-native-ultimate-config/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: packages/react-native-ultimate-config

      - name: Build TypeScript
        run: npm run build
        working-directory: packages/react-native-ultimate-config

      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        working-directory: packages/react-native-ultimate-config

      - name: Copy license and docs
        run: cp -r LICENSE README.md docs packages/react-native-ultimate-config

      - name: Publish to npm
        run: npm publish
        working-directory: packages/react-native-ultimate-config
