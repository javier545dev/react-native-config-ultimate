name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Copy LICENSE and README to package
        run: cp LICENSE README.md packages/react-native-config-ultimate/

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/react-native-config-ultimate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
