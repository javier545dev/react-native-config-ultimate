# Environment config using YAML format
# This demonstrates per-platform values and app identity

API_URL: https://api.dev.example.com
APP_NAME: DEV
DEBUG_MODE: true
VERSION: 1.0.0-dev

# App icon reference (points to asset name in native projects)
# iOS: Asset catalog name (can have uppercase)
# Android: mipmap resource name (must be lowercase)
APP_ICON:
  ios: AppIconDev
  android: app_icon_dev

# Example of per-platform values
ANALYTICS_KEY:
  ios: ios-dev-key-123
  android: android-dev-key-456
