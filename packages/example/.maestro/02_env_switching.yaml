# ============================================================================
# Maestro E2E — Environment Switching
# ============================================================================
#
# WHAT IT TESTS:
#   Simulates a full environment switch workflow:
#     1. App starts with .env.staging → verifies staging values
#     2. Re-runs rncu with .env.production → rebuild → verifies prod values
#
# NOTE:
#   This flow requires TWO separate test runs (you rebuild between them).
#   It serves as a documentation example more than an automated flow.
#   For fully automated env switching tests, use Detox + Jest (see e2e/).
#
# PREREQUISITES:
#   - .env.staging file with: APP_ENV=staging
#   - .env.production file with: APP_ENV=production
#   - App built with the target env:
#       npx rncu .env.staging && npx react-native run-ios
#
# RUN (after building with staging env):
#   maestro test .maestro/02_env_switching.yaml --env ENV=staging
#
# RUN (after building with production env):
#   maestro test .maestro/02_env_switching.yaml --env ENV=production
# ============================================================================

appId: com.example

---

- launchApp:
    clearState: true

- assertVisible:
    id: "section-title-config"

# ── Verify the environment value is present ──────────────────────────────────
#
# Uses the --env parameter passed at runtime:
#   maestro test ... --env ENV=staging
#
- assertVisible:
    text: "${ENV}"

# ── Verify the config section body contains valid JSON ───────────────────────
- assertVisible:
    id: "section-body-config"

# ── Take a screenshot for visual comparison ──────────────────────────────────
- takeScreenshot: "config-${ENV}"
